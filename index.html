<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Note Taking App</title>
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #363636;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-blue: #3a7bd5;
            --accent-green: #43a047;
            --accent-red: #d32f2f;
            --border-color: #404040;
            --hover-color: #454545;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .tree-view {
            width: 300px;
            background-color: var(--bg-secondary);
            padding: 20px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .note-content {
            flex: 1;
            padding: 20px;
            background-color: var(--bg-primary);
        }

        .tree-item {
            cursor: pointer;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tree-item:hover {
            background-color: var(--hover-color);
        }

        .tree-item.active {
            background-color: var(--hover-color);
            border-left: 3px solid var(--accent-blue);
        }

        .group {
            margin-left: 0px;
            margin-bottom: 15px;
        }

        .sub-note {
            margin-left: 20px;
            font-size: 0.95em;
            opacity: 0.9;
        }

        #note-title {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 18px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            transition: border-color 0.2s ease;
        }

        #note-text {
            width: 100%;
            height: calc(100vh - 150px);
            padding: 15px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            line-height: 1.6;
            transition: border-color 0.2s ease;
        }

        #note-title:focus, #note-text:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .button {
            width: 100%;
            padding: 12px;
            color: var(--text-primary);
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            border-radius: 6px;
            font-weight: 500;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            filter: brightness(110%);
        }

        .button:active {
            transform: translateY(0);
        }

        .add-group-btn {
            background-color: var(--accent-blue);
        }

        .add-note-btn {
            background-color: var(--accent-green);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .group-header:hover {
            filter: brightness(110%);
        }

        .add-sub-note {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0 5px;
            color: var(--text-primary);
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .add-sub-note:hover {
            opacity: 1;
        }

        .delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--accent-red);
            font-size: 1.2em;
            padding: 0 5px;
            opacity: 0.7;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .rename-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1.2em;
            padding: 0 5px;
            opacity: 0.7;
            transition: all 0.2s ease;
        }

        .rename-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .group-header-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .note-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .note-timestamp {
            font-size: 0.8em;
            opacity: 0.7;
            color: var(--text-secondary);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--hover-color);
        }

        /* Group colors for dark mode */
        .group-colors {
            opacity: 0.8;
        }

        .group-header span[contenteditable] {
            outline: none;
            min-width: 50px;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .group-header span[contenteditable]:focus {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
    <!-- Add Quill CSS and JS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <style>
        /* Add these styles for Quill */
        .ql-toolbar.ql-snow {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color) !important;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        .ql-container.ql-snow {
            border: 1px solid var(--border-color) !important;
            border-top: none !important;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            height: calc(100vh - 150px);
        }

        .ql-editor {
            font-family: inherit;
        }

        .ql-snow .ql-stroke {
            stroke: var(--text-primary) !important;
        }

        .ql-snow .ql-fill {
            fill: var(--text-primary) !important;
        }

        .ql-snow .ql-picker {
            color: var(--text-primary) !important;
        }

        .ql-snow .ql-picker-options {
            background-color: var(--bg-secondary) !important;
            border-color: var(--border-color) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tree-view">
            <button class="button add-group-btn" onclick="addNewGroup()">Add New Group</button>
            <button class="button add-note-btn" onclick="addNewNote(null)">Add New Note</button>
            <div id="notes-tree"></div>
        </div>
        <div class="note-content">
            <input type="text" id="note-title" placeholder="Note Title">
            <div id="note-text"></div>
        </div>
    </div>

    <script>
        // Initialize Quill
        const quill = new Quill('#note-text', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'script': 'sub'}, { 'script': 'super' }],
                    [{ 'indent': '-1'}, { 'indent': '+1' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image'],
                    ['clean']
                ]
            },
            placeholder: 'Write your note here...'
        });

        let notes = JSON.parse(localStorage.getItem('notes') || '[]');
        let currentNoteId = null;
        const groupColors = [
            '#4a148c', '#1a237e', '#0d47a1', '#004d40',
            '#1b5e20', '#b71c1c', '#4a148c', '#311b92'
        ];
        let colorIndex = parseInt(localStorage.getItem('colorIndex') || '0');

        function addNewGroup() {
            const group = {
                id: Date.now(),
                type: 'group',
                title: 'New Group',
                color: groupColors[colorIndex % groupColors.length],
                notes: [],
                created: Date.now(),
                lastModified: Date.now()
            };
            colorIndex++;
            notes.push(group);
            updateNotesTree();
            saveToLocalStorage();
        }

        function addNewNote(groupId) {
            const note = {
                id: Date.now(),
                type: 'note',
                title: 'New Note',
                content: '',
                groupId: groupId,
                created: Date.now(),
                lastModified: Date.now()
            };
            
            if (groupId) {
                const group = notes.find(g => g.id === groupId);
                if (group) {
                    group.notes.push(note);
                    group.lastModified = Date.now();
                }
            } else {
                notes.push(note);
            }
            
            updateNotesTree();
            saveToLocalStorage();
            selectNote(note.id);
        }

        function updateNotesTree() {
            const treeContainer = document.getElementById('notes-tree');
            treeContainer.innerHTML = '';
            
            notes.forEach(item => {
                if (item.type === 'group') {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'group';
                    
                    const groupHeader = document.createElement('div');
                    groupHeader.className = 'group-header tree-item';
                    groupHeader.style.backgroundColor = item.color;
                    
                    const groupTitle = document.createElement('span');
                    groupTitle.textContent = item.title;
                    
                    const buttonContainer = document.createElement('div');
                    buttonContainer.className = 'group-header-buttons';

                    // Add rename button
                    const renameButton = document.createElement('button');
                    renameButton.className = 'rename-btn';
                    renameButton.innerHTML = '✎'; // Pencil icon
                    renameButton.onclick = (e) => {
                        e.stopPropagation();
                        const newTitle = prompt('Enter new group name:', item.title);
                        if (newTitle && newTitle.trim()) {
                            item.title = newTitle.trim();
                            item.lastModified = Date.now();
                            updateNotesTree();
                            saveToServer();
                        }
                    };

                    const addButton = document.createElement('button');
                    addButton.className = 'add-sub-note';
                    addButton.textContent = '+';
                    addButton.onclick = (e) => {
                        e.stopPropagation();
                        addNewNote(item.id);
                    };

                    const deleteButton = document.createElement('button');
                    deleteButton.className = 'delete-btn';
                    deleteButton.textContent = '×';
                    deleteButton.onclick = (e) => {
                        e.stopPropagation();
                        deleteGroup(item.id);
                    };
                    
                    buttonContainer.appendChild(renameButton);
                    buttonContainer.appendChild(addButton);
                    buttonContainer.appendChild(deleteButton);
                    
                    groupHeader.appendChild(groupTitle);
                    groupHeader.appendChild(buttonContainer);
                    groupDiv.appendChild(groupHeader);
                    
                    // Add sub-notes
                    item.notes.forEach(note => {
                        const noteElement = createNoteElement(note, item.color);
                        noteElement.className += ' sub-note';
                        groupDiv.appendChild(noteElement);
                    });
                    
                    treeContainer.appendChild(groupDiv);
                } else if (item.type === 'note' && !item.groupId) {
                    // Add standalone notes
                    treeContainer.appendChild(createNoteElement(item));
                }
            });
        }

        function createNoteElement(note, groupColor) {
            const noteDiv = document.createElement('div');
            noteDiv.className = `tree-item ${note.id === currentNoteId ? 'active' : ''}`;
            
            if (!groupColor) {
                noteDiv.style.backgroundColor = 'var(--bg-tertiary)';
            } else {
                noteDiv.style.backgroundColor = groupColor;
            }

            const noteHeader = document.createElement('div');
            noteHeader.className = 'note-header';

            const noteInfo = document.createElement('div');
            noteInfo.className = 'note-info';

            const noteTitle = document.createElement('span');
            noteTitle.textContent = note.title;
            noteTitle.onclick = () => selectNote(note.id);

            const lastModified = document.createElement('small');
            lastModified.className = 'note-timestamp';  // Add the new class
            lastModified.textContent = formatLastModified(note.lastModified);

            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-btn';
            deleteButton.textContent = '×';
            deleteButton.onclick = (e) => {
                e.stopPropagation();
                deleteNote(note.id);
            };

            noteInfo.appendChild(noteTitle);
            noteInfo.appendChild(lastModified);
            noteHeader.appendChild(noteInfo);
            noteHeader.appendChild(deleteButton);
            noteDiv.appendChild(noteHeader);

            return noteDiv;
        }

        function selectNote(id) {
            currentNoteId = id;
            let note = null;
            
            note = notes.find(n => n.type === 'note' && n.id === id);
            
            if (!note) {
                notes.forEach(group => {
                    if (group.type === 'group') {
                        const foundNote = group.notes.find(n => n.id === id);
                        if (foundNote) note = foundNote;
                    }
                });
            }
            
            if (note) {
                document.getElementById('note-title').value = note.title;
                quill.root.innerHTML = note.content || '';
                updateNotesTree();
            }
        }

        function saveCurrentNote() {
            if (!currentNoteId) return;
            
            let note = notes.find(n => n.type === 'note' && n.id === currentNoteId);
            
            if (!note) {
                notes.forEach(group => {
                    if (group.type === 'group') {
                        const foundNote = group.notes.find(n => n.id === currentNoteId);
                        if (foundNote) note = foundNote;
                    }
                });
            }
            
            if (note) {
                note.title = document.getElementById('note-title').value;
                note.content = quill.root.innerHTML;
                note.lastModified = Date.now(); // Add timestamp
                updateNotesTree();
                saveToLocalStorage();
            }
        }

        function deleteNote(noteId) {
            if (confirm('Are you sure you want to delete this note?')) {
                // Remove from standalone notes
                notes = notes.filter(n => n.type === 'group' || n.id !== noteId);
                
                // Remove from groups
                notes.forEach(group => {
                    if (group.type === 'group') {
                        group.notes = group.notes.filter(n => n.id !== noteId);
                        if (group.notes.length !== group.notes.filter(n => n.id !== noteId).length) {
                            group.lastModified = Date.now();
                        }
                    }
                });

                if (currentNoteId === noteId) {
                    currentNoteId = null;
                    document.getElementById('note-title').value = '';
                    quill.setContents([]);
                }
                
                updateNotesTree();
                saveToLocalStorage();
            }
        }

        function deleteGroup(groupId) {
            if (confirm('Are you sure you want to delete this group and all its notes?')) {
                const group = notes.find(g => g.id === groupId);
                if (group) {
                    group.notes.forEach(note => {
                        if (note.id === currentNoteId) {
                            currentNoteId = null;
                            document.getElementById('note-title').value = '';
                            quill.setContents([]);
                        }
                    });
                }
                
                notes = notes.filter(item => item.id !== groupId);
                updateNotesTree();
                saveToLocalStorage();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('notes', JSON.stringify(notes));
            localStorage.setItem('colorIndex', colorIndex.toString());
            saveToServer();
        }

        function formatLastModified(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        // Add event listeners for auto-saving
        document.getElementById('note-title').addEventListener('input', saveCurrentNote);
        quill.on('text-change', saveCurrentNote);

        // Add auto-save interval (save every 30 seconds)
        setInterval(saveCurrentNote, 30000);

        // Add event listener for beforeunload to save before closing
        window.addEventListener('beforeunload', saveCurrentNote);

        // Add new function to save to server
        async function saveToServer() {
            try {
                const response = await fetch('/api/notes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(notes)
                });
                
                if (!response.ok) {
                    console.error('Failed to save to server:', await response.text());
                }
            } catch (err) {
                console.error('Error saving to server:', err);
            }
        }

        // Add function to load from server
        async function loadFromServer() {
            try {
                const response = await fetch('/api/notes');
                if (response.ok) {
                    const serverNotes = await response.json();
                    if (serverNotes && serverNotes.length > 0) {
                        notes = serverNotes;
                        updateNotesTree();
                    }
                }
            } catch (err) {
                console.error('Error loading from server:', err);
            }
        }

        // Initialize the app
        window.addEventListener('DOMContentLoaded', async () => {
            await loadFromServer();
            if (notes.length === 0) {
                addNewGroup();
                addNewNote(null);
            } else {
                updateNotesTree();
            }
        });
    </script>
</body>
</html>
